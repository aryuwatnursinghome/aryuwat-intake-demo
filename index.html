<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>อายุวัฒน์ — ประเมินแพ็กเกจและนัดหมาย</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C8912A;
  --gold-lt: #E8B84B;
  --gold-pale: #FDF6E8;
  --brown: #4A2C0A;
  --brown-md: #7A4A1A;
  --cream: #FAF6F0;
  --white: #FFFFFF;
  --gray: #6B6B6B;
  --gray-lt: #F0EDE8;
  --red: #C0392B;
  --green: #27AE60;
  --shadow: 0 4px 24px rgba(74,44,10,0.10);
  --shadow-lg: 0 12px 48px rgba(74,44,10,0.18);
  --radius: 16px;
  --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Sarabun', sans-serif;
  background: var(--cream);
  color: var(--brown);
  min-height: 100vh;
}

/* ─── HEADER ─── */
.header {
  background: linear-gradient(135deg, var(--brown) 0%, #2E1A06 100%);
  padding: 20px 24px 18px;
  display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,0.3);
}
.logo-box { width: 48px; height: 48px; background: var(--gold); border-radius: 50%;
  display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:22px; }
.header-text h1 { font-family:'Playfair Display',serif; color:var(--gold-lt); font-size:20px; letter-spacing:.5px; }
.header-text p { color:rgba(255,255,255,.6); font-size:13px; margin-top:2px; }

/* ─── PROGRESS BAR ─── */
.progress-wrap { background:var(--brown); padding:0 24px 16px; }
.progress-steps { display:flex; gap:0; }
.step-dot {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; position:relative;
}
.step-dot::before {
  content:''; position:absolute; top:11px; left:50%; width:100%; height:2px;
  background:rgba(255,255,255,.2); z-index:0;
}
.step-dot:last-child::before { display:none; }
.dot {
  width:24px; height:24px; border-radius:50%; background:rgba(255,255,255,.2);
  display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700;
  color:rgba(255,255,255,.5); z-index:1; transition:.3s; flex-shrink:0;
}
.step-dot.active .dot { background:var(--gold); color:var(--brown); }
.step-dot.done .dot { background:var(--green); color:#fff; }
.step-dot .label { font-size:10px; color:rgba(255,255,255,.45); text-align:center; line-height:1.2; }
.step-dot.active .label { color:var(--gold-lt); }
.step-dot.done .label { color:rgba(255,255,255,.7); }

/* ─── MAIN ─── */
.container { max-width:680px; margin:0 auto; padding:24px 16px 120px; }

/* ─── CARD ─── */
.card {
  background:var(--white); border-radius:var(--radius);
  box-shadow: var(--shadow); padding:28px 24px; margin-bottom:16px;
  animation: fadeUp .4s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

.card-title { font-size:18px; font-weight:700; color:var(--brown); margin-bottom:6px; }
.card-sub { font-size:13px; color:var(--gray); margin-bottom:20px; line-height:1.6; }

/* ─── BRANCH CARDS ─── */
.branch-grid { display:grid; grid-template-columns:1fr; gap:12px; }
.branch-card {
  border:2px solid var(--gray-lt); border-radius:var(--radius-sm); padding:18px 20px;
  cursor:pointer; transition:.25s; display:flex; gap:14px; align-items:flex-start;
  background:var(--white);
}
.branch-card:hover { border-color:var(--gold); background:var(--gold-pale); }
.branch-card.selected { border-color:var(--gold); background:var(--gold-pale); }
.branch-card.selected .branch-icon { background:var(--gold); }
.branch-icon {
  width:44px; height:44px; border-radius:10px; background:var(--gray-lt);
  display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0;
  transition:.25s;
}
.branch-info h3 { font-size:15px; font-weight:700; margin-bottom:4px; }
.branch-info p { font-size:12px; color:var(--gray); line-height:1.5; }
.branch-badge { font-size:11px; background:var(--gold-pale); color:var(--gold); border:1px solid var(--gold-lt);
  padding:2px 8px; border-radius:20px; margin-top:6px; display:inline-block; font-weight:600; }

/* ─── PACKAGE SELECT ─── */
.pkg-grid { display:grid; gap:10px; }
.pkg-card {
  border:2px solid var(--gray-lt); border-radius:var(--radius-sm); padding:16px 18px;
  cursor:pointer; transition:.25s;
}
.pkg-card:hover { border-color:var(--gold); background:var(--gold-pale); }
.pkg-card.selected { border-color:var(--gold); background:var(--gold-pale); }
.pkg-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.pkg-name { font-weight:700; font-size:14px; }
.pkg-price { text-align:right; }
.pkg-price .main { font-size:18px; font-weight:700; color:var(--gold); }
.pkg-price .unit { font-size:11px; color:var(--gray); }
.pkg-rooms { display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
.room-chip {
  font-size:11px; border:1px solid var(--gray-lt); border-radius:20px;
  padding:3px 10px; cursor:pointer; transition:.2s; background:var(--white);
}
.room-chip:hover { border-color:var(--gold); color:var(--gold); }
.room-chip.selected { background:var(--gold); color:var(--white); border-color:var(--gold); }
.pkg-includes { margin-top:10px; }
.pkg-includes span { font-size:12px; color:var(--gray); }
.include-tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
.tag { font-size:11px; background:var(--gray-lt); color:var(--brown-md);
  padding:3px 9px; border-radius:20px; display:flex; align-items:center; gap:3px; }
.tag.green { background:#E8F8EE; color:#1B7A40; }
.tag.gold { background:var(--gold-pale); color:var(--gold); }

/* ─── PROCEDURES ─── */
.proc-section { margin-bottom:18px; }
.proc-section-title { font-size:13px; font-weight:700; color:var(--gray); text-transform:uppercase;
  letter-spacing:.8px; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
.proc-list { display:grid; gap:8px; }
.proc-item {
  display:flex; align-items:center; gap:12px; padding:11px 14px;
  border:1px solid var(--gray-lt); border-radius:var(--radius-sm);
  cursor:pointer; transition:.2s; background:var(--white);
}
.proc-item:hover { border-color:var(--gold-lt); background:var(--gold-pale); }
.proc-item.selected { border-color:var(--gold); background:var(--gold-pale); }
.proc-item.included { cursor:default; opacity:.7; border-style:dashed; }
.proc-check {
  width:22px; height:22px; border-radius:6px; border:2px solid var(--gray-lt);
  display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:.2s;
}
.proc-item.selected .proc-check { background:var(--gold); border-color:var(--gold); color:#fff; }
.proc-item.included .proc-check { background:var(--gray-lt); border-color:transparent; }
.proc-name { flex:1; font-size:13px; }
.proc-price-tag { font-size:12px; font-weight:600; color:var(--gold); white-space:nowrap; }
.proc-price-tag.included { color:var(--green); font-weight:500; }
.proc-price-tag.assess { color:var(--gray); font-style:italic; }

/* ─── ALERT BOX ─── */
.alert-box {
  border-radius:var(--radius-sm); padding:14px 16px; margin-bottom:16px;
  display:flex; gap:10px; align-items:flex-start; font-size:13px; line-height:1.6;
  animation: fadeUp .3s ease;
}
.alert-box.warn { background:#FEF3E2; border:1px solid #F5A623; color:#7A4A00; }
.alert-box.info { background:#E8F4FD; border:1px solid #2980B9; color:#1A5276; }
.alert-box.danger { background:#FDEDEC; border:1px solid var(--red); color:#922B21; }
.alert-icon { font-size:16px; flex-shrink:0; margin-top:1px; }

/* ─── SUMMARY CARD ─── */
.summary-section { margin-bottom:16px; }
.summary-label { font-size:12px; color:var(--gray); margin-bottom:4px; }
.summary-value { font-size:15px; font-weight:600; }
.price-breakdown { border-top:1px solid var(--gray-lt); padding-top:14px; margin-top:14px; }
.price-row { display:flex; justify-content:space-between; font-size:13px; padding:4px 0; }
.price-row.total { font-size:16px; font-weight:700; color:var(--gold); border-top:2px solid var(--gold-lt); padding-top:10px; margin-top:6px; }
.price-row.deposit { color:var(--gray); font-size:12px; }
.price-note { font-size:11px; color:var(--gray); margin-top:8px; line-height:1.5; }

/* ─── FORM ─── */
.form-group { margin-bottom:16px; }
.form-label { font-size:13px; font-weight:600; margin-bottom:6px; display:block; color:var(--brown); }
.form-label .req { color:var(--red); }
.form-input, .form-select, .form-textarea {
  width:100%; border:1.5px solid var(--gray-lt); border-radius:var(--radius-sm);
  padding:12px 14px; font-family:'Sarabun',sans-serif; font-size:14px;
  color:var(--brown); background:var(--white); transition:.2s; outline:none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color:var(--gold); box-shadow:0 0 0 3px rgba(200,145,42,.12);
}
.form-textarea { min-height:90px; resize:vertical; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
@media(max-width:480px){ .form-row { grid-template-columns:1fr; } }

.date-slots { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.date-slot {
  border:1.5px solid var(--gray-lt); border-radius:var(--radius-sm); padding:10px 12px;
  cursor:pointer; transition:.2s; text-align:center; font-size:13px;
}
.date-slot:hover { border-color:var(--gold); background:var(--gold-pale); }
.date-slot.selected { border-color:var(--gold); background:var(--gold-pale); font-weight:600; }
.date-slot .day { font-weight:700; font-size:15px; }
.date-slot .weekday { font-size:11px; color:var(--gray); }
.time-slots { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
.time-slot {
  border:1.5px solid var(--gray-lt); border-radius:20px; padding:6px 14px;
  cursor:pointer; transition:.2s; font-size:13px;
}
.time-slot:hover { border-color:var(--gold); color:var(--gold); }
.time-slot.selected { background:var(--gold); color:#fff; border-color:var(--gold); }

/* ─── BOTTOM BAR ─── */
.bottom-bar {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--white); border-top:1px solid var(--gray-lt);
  padding:14px 20px; display:flex; gap:10px; align-items:center;
  box-shadow:0 -4px 24px rgba(0,0,0,.10); z-index:100;
}
.btn {
  padding:13px 22px; border-radius:var(--radius-sm); font-family:'Sarabun',sans-serif;
  font-size:15px; font-weight:700; cursor:pointer; border:none; transition:.2s;
  display:flex; align-items:center; gap:6px;
}
.btn-gold { background:linear-gradient(135deg,var(--gold),var(--gold-lt)); color:var(--white); flex:1;
  box-shadow:0 4px 16px rgba(200,145,42,.35); }
.btn-gold:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(200,145,42,.45); }
.btn-gold:disabled { opacity:.45; transform:none; cursor:not-allowed; }
.btn-outline { background:transparent; color:var(--brown); border:1.5px solid var(--gray-lt);
  padding:13px 18px; }
.btn-outline:hover { border-color:var(--gold); color:var(--gold); }

/* ─── SUCCESS ─── */
.success-wrap { text-align:center; padding:40px 24px; animation:fadeUp .5s ease; }
.success-icon { font-size:64px; margin-bottom:16px; }
.success-title { font-family:'Playfair Display',serif; font-size:26px; color:var(--brown); margin-bottom:10px; }
.success-sub { color:var(--gray); font-size:14px; line-height:1.7; margin-bottom:24px; }
.appt-box {
  background:var(--gold-pale); border:1.5px solid var(--gold-lt);
  border-radius:var(--radius); padding:20px; margin-bottom:20px; text-align:left;
}
.appt-box h4 { font-size:13px; color:var(--gold); font-weight:700; text-transform:uppercase;
  letter-spacing:.8px; margin-bottom:12px; }
.appt-row { display:flex; gap:8px; align-items:flex-start; font-size:13px; padding:4px 0; }
.appt-row .icon { font-size:15px; flex-shrink:0; }
.ref-badge {
  background:var(--brown); color:var(--gold-lt); font-size:13px; font-weight:700;
  padding:10px 20px; border-radius:var(--radius-sm); display:inline-block; letter-spacing:2px;
  margin-bottom:20px;
}
.contact-strip { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
.contact-btn {
  display:flex; align-items:center; gap:6px; padding:10px 16px; border-radius:var(--radius-sm);
  font-size:13px; font-weight:600; text-decoration:none; border:1.5px solid var(--gold-lt);
  color:var(--brown); background:var(--white); transition:.2s; cursor:pointer;
}
.contact-btn:hover { background:var(--gold-pale); border-color:var(--gold); }

/* print hidden */
.no-print { }
@media print {
  .header,.bottom-bar,.no-print,.btn { display:none !important; }
  body { background:#fff; }
  .container { padding:0; }
}
</style>
</head>

  <div class="header-text">
    <h1>Aryuwat Nursing Home</h1>
    <p>ประเมินแพ็กเกจ & นัดหมายพูดคุย — อายุวัฒน์ เนอร์สซิ่ง โฮม</p>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-steps" id="progressSteps"></div>
</div>

<div class="container" id="mainContent"></div>

<div class="bottom-bar" id="bottomBar"></div>

const STEPS = [
  {id:'branch', label:'เลือกสาขา'},
  {id:'package', label:'แพ็กเกจ'},
  {id:'procedures', label:'หัตถการ'},
  {id:'summary', label:'สรุปราคา'},
  {id:'contact', label:'ข้อมูลติดต่อ'},
  {id:'appointment', label:'นัดหมาย'},
  {id:'done', label:'เสร็จสิ้น'},
];

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
const S = {
  step: 0,
  branch: null,
  package: null,
  room: null,
  procs: [],    // selected procedure ids
  contact: {},
  date: null,
  time: null,
};

// ══════════════════════════════════════════════════════
// RENDER ENGINE
// ══════════════════════════════════════════════════════
function render(){
  renderProgress();
  const step = STEPS[S.step].id;
  const c = document.getElementById('mainContent');
  if(step==='branch')     c.innerHTML = renderBranch();
  else if(step==='package')    c.innerHTML = renderPackage();
  else if(step==='procedures') c.innerHTML = renderProcedures();
  else if(step==='summary')    c.innerHTML = renderSummary();
  else if(step==='contact')    c.innerHTML = renderContact();
  else if(step==='appointment')c.innerHTML = renderAppointment();
  else if(step==='done')       c.innerHTML = renderDone();
  renderBottomBar();
  bindEvents();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderProgress(){
  const ps = document.getElementById('progressSteps');
  ps.innerHTML = STEPS.map((s,i)=>`
    <div class="step-dot ${i<S.step?'done':i===S.step?'active':''}">
      <div class="dot">${i<S.step?'✓':(i+1)}</div>
      <div class="label">${s.label}</div>
    </div>`).join('');
}

function renderBottomBar(){
  const bb = document.getElementById('bottomBar');
  const step = STEPS[S.step].id;
  if(step==='done'){ bb.innerHTML=''; return; }
  const canNext = canGoNext();
  const backBtn = S.step>0 ? `<button class="btn btn-outline" onclick="goBack()">← ย้อนกลับ</button>` : '';
  const nextLabel = {
    branch:'เลือกแพ็กเกจ →',
    package:'เลือกหัตถการเพิ่ม →',
    procedures:'ดูสรุปราคา →',
    summary:'กรอกข้อมูลติดต่อ →',
    contact:'เลือกวันนัดหมาย →',
    appointment:'ยืนยันนัดหมาย ✓',
  }[step]||'ถัดไป →';
  bb.innerHTML = `${backBtn}
    <button class="btn btn-gold" onclick="goNext()" ${canNext?'':'disabled'}>${nextLabel}</button>`;
}

function canGoNext(){
  const step = STEPS[S.step].id;
  if(step==='branch') return !!S.branch;
  if(step==='package') return !!S.package && !!S.room;
  if(step==='procedures') return true;
  if(step==='summary') return true;
  if(step==='contact'){
    const f = S.contact;
    return f.name && f.phone && f.relation;
  }
  if(step==='appointment') return !!S.date && !!S.time;
  return true;
}

function goNext(){
  if(!canGoNext()) return;
  // validation for contact
  if(STEPS[S.step].id==='contact'){
    const f = S.contact;
    if(!f.name||!f.phone||!f.relation){ alert('กรุณากรอกชื่อ เบอร์โทร และความสัมพันธ์กับผู้ป่วย'); return; }
  }
  S.step = Math.min(S.step+1, STEPS.length-1);
  render();
}
function goBack(){
  S.step = Math.max(S.step-1,0);
  render();
}

function selectRoom(pid,rid){

function toggleProc(id){
  const idx = S.procs.indexOf(id);
  if(idx>=0) S.procs.splice(idx,1);
  else S.procs.push(id);
  document.getElementById('mainContent').innerHTML = renderProcedures();
  bindEvents();
  renderBottomBar();
}

function calcPrice(){
  const branch=BRANCHES.find(b=>b.id===S.branch);
  const pkg=branch.packages.find(p=>p.id===S.package);
  const room=pkg.rooms.find(r=>r.id===S.room);
  const baseMonth = room?.price_month||0;
  const procs = PROCEDURES[S.branch]||[];
  const allItems = procs.flatMap(g=>g.items);
  let extras=[];
  S.procs.forEach(pid=>{
    const it=allItems.find(i=>i.id===pid);
    if(it && !it.included_in.includes(S.package)){
      extras.push({name:it.name, price:it.price_month||it.price_once||0, label:it.label});
    }
  });
  const extraTotal = extras.reduce((a,b)=>a+b.price,0);
  return {baseMonth,extras,extraTotal,total:baseMonth+extraTotal,deposit:room?.deposit||0,pkg,room,branch};
}

    <div class="form-group">
      <label class="form-label">ชื่อ-นามสกุล ผู้ติดต่อ <span class="req">*</span></label>
      <input class="form-input" id="f_name" placeholder="ชื่อ-นามสกุลของท่าน" value="${f.name||''}">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">เบอร์โทรศัพท์ <span class="req">*</span></label>
        <input class="form-input" id="f_phone" type="tel" placeholder="09X-XXX-XXXX" value="${f.phone||''}">
      </div>
      <div class="form-group">
        <label class="form-label">LINE ID (ถ้ามี)</label>
        <input class="form-input" id="f_line" placeholder="@lineID" value="${f.line||''}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">ความสัมพันธ์กับผู้ป่วย <span class="req">*</span></label>
        <select class="form-select" id="f_relation">
          <option value="">-- เลือก --</option>
          ${['บุตร/บุตรสาว','คู่สมรส','พ่อ/แม่','พี่น้อง','ญาติ','อื่นๆ'].map(r=>`<option value="${r}" ${f.relation===r?'selected':''}>${r}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">ชื่อผู้ป่วย</label>
        <input class="form-input" id="f_patient" placeholder="ชื่อผู้ป่วย" value="${f.patient||''}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">อายุผู้ป่วย</label>
        <input class="form-input" id="f_age" type="number" placeholder="อายุ (ปี)" value="${f.age||''}">
      </div>
      <div class="form-group">
        <label class="form-label">วินิจฉัย / โรคหลัก</label>
        <input class="form-input" id="f_dx" placeholder="เช่น Stroke, Alzheimer's" value="${f.dx||''}">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">ต้องการเข้าพักช่วงใด</label>
      <select class="form-select" id="f_urgency">
        <option value="">-- เลือก --</option>
        ${['ภายใน 1 สัปดาห์','1-2 สัปดาห์','1 เดือน','ยังไม่แน่ใจ / สอบถามข้อมูลก่อน'].map(u=>`<option value="${u}" ${f.urgency===u?'selected':''}>${u}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">ข้อมูลเพิ่มเติม / คำถาม</label>
      <textarea class="form-textarea" id="f_note" placeholder="เช่น ต้องการห้องใกล้ชิดพ่อแม่ มีสัตว์เลี้ยง ฯลฯ">${f.note||''}</textarea>
    </div>
  </div>`;
}

function renderAppointment(){
  // generate next 7 days
  const days=['อา','จ','อ','พ','พฤ','ศ','ส'];
  const months=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const slots=[]; const now=new Date();
  for(let i=1;i<=8;i++){
    const d=new Date(now); d.setDate(now.getDate()+i);
    slots.push({date:d.toISOString().split('T')[0],
      label:d.getDate()+' '+months[d.getMonth()],
      weekday:days[d.getDay()]});
  }
  const times=['09:00','10:00','11:00','13:00','14:00','15:00','16:00'];
  return `<div class="card">
    <div class="card-title">เลือกวันและเวลานัดพูดคุย</div>
    <div class="card-sub">เจ้าหน้าที่จะโทรหาท่านตามเวลาที่เลือก เพื่อพูดคุยรายละเอียดและนัดเยี่ยมชมสถานที่</div>
    <label class="form-label">วันที่สะดวก <span class="req">*</span></label>
    <div class="date-slots">
      ${slots.map(s=>`
        <div class="date-slot ${S.date===s.date?'selected':''}" onclick="S.date='${s.date}';render()">
          <div class="day">${s.label}</div>
          <div class="weekday">${s.weekday}</div>
        </div>`).join('')}
    </div>
    <label class="form-label" style="margin-top:18px">เวลาที่สะดวก <span class="req">*</span></label>
    <div class="time-slots">
      ${times.map(t=>`
        <div class="time-slot ${S.time===t?'selected':''}" onclick="S.time='${t}';render()">${t} น.</div>`).join('')}
    </div>
    <div class="alert-box info" style="margin-top:16px">
      <span class="alert-icon">📞</span>
      หากต้องการติดต่อด่วน โทร <strong>099-424-4566</strong> หรือ LINE <strong>@aryuwat</strong>
    </div>
  </div>`;
}

function renderDone(){
  const {total,deposit,pkg,room,branch} = calcPrice();
  const refNo = 'ARY-'+Date.now().toString().slice(-6);
  const dayMap=['อา','จ','จ','อ','พ','พฤ','ศ'];
  let dateStr=''; let dateObj=null;
  if(S.date){ dateObj=new Date(S.date);
    const months=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    dateStr=`วัน${dayMap[dateObj.getDay()]}ที่ ${dateObj.getDate()} ${months[dateObj.getMonth()]} ${dateObj.getFullYear()+543}`; }
  return `<div class="card">
    <div class="success-wrap">
      <div class="success-icon">✅</div>
      <div class="success-title">รับข้อมูลเรียบร้อยแล้ว</div>
      <div class="success-sub">เจ้าหน้าที่อายุวัฒน์จะติดต่อกลับท่าน<br><strong>${S.contact.name}</strong> ที่ ${S.contact.phone}<br>ภายใน 24 ชั่วโมง (Lead A: ภายใน 5 นาที)</div>
      <div class="ref-badge">หมายเลขอ้างอิง: ${refNo}</div>
      <div class="appt-box">
        <h4>📋 สรุปข้อมูล</h4>
        <div class="appt-row"><span class="icon">🏥</span><span><strong>สาขา:</strong> ${branch.name}</span></div>
        <div class="appt-row"><span class="icon">📦</span><span><strong>แพ็กเกจ:</strong> ${pkg.name} — ${room.label}</span></div>
        <div class="appt-row"><span class="icon">💰</span><span><strong>ประมาณ:</strong> ${total.toLocaleString()} ฿/เดือน | เงินประกัน ${deposit.toLocaleString()} ฿</span></div>
        ${S.date?`<div class="appt-row"><span class="icon">📅</span><span><strong>นัดหมาย:</strong> ${dateStr} เวลา ${S.time} น.</span></div>`:''}
        <div class="appt-row"><span class="icon">👤</span><span><strong>ผู้ติดต่อ:</strong> ${S.contact.name} (${S.contact.relation})</span></div>
        ${S.contact.patient?`<div class="appt-row"><span class="icon">🧓</span><span><strong>ผู้ป่วย:</strong> ${S.contact.patient} ${S.contact.age?'อายุ '+S.contact.age+' ปี':''}</span></div>`:''}
      </div>
      <div class="contact-strip">
        <a class="contact-btn" href="tel:099-424-4566">📞 โทรเลย</a>
        <a class="contact-btn" href="https://line.me/R/ti/p/@aryuwat" target="_blank">💬 LINE @aryuwat</a>
        <button class="contact-btn" onclick="window.print()">🖨️ พิมพ์ / บันทึก</button>
        <button class="contact-btn" onclick="resetForm()">🔄 เริ่มใหม่</button>
      </div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════
// EVENT BINDING
// ══════════════════════════════════════════════════════
function bindEvents(){
  const step = STEPS[S.step].id;
  if(step==='contact'){
    ['name','phone','line','relation','patient','age','dx','urgency','note'].forEach(k=>{
      const el=document.getElementById('f_'+k);
      if(el) el.addEventListener('input',()=>{ S.contact[k]=el.value; renderBottomBar(); });
    });
  }
}

function resetForm(){
  Object.assign(S,{step:0,branch:null,package:null,room:null,procs:[],contact:{},date:null,time:null});
  render();
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
render();
</script>
